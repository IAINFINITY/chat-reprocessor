          <span id="themeIcon"></span>

    <main class="page-body">
      <div class="main-col">
        <div class="section-group">
          <div class="section-divider">
            <h2>Tabelas Supabase</h2>
            <span class="line"></span>
          </div>

          <section class="card anim-card">
            <div class="card-header">
              <span class="card-title"><span class="bar"></span>Explorar tabelas</span>
              <button id="loadTablesBtn" class="btn btn-secondary btn-sm">Atualizar</button>
            </div>
            <div class="supabase-tables-layout">
              <div class="supabase-controls">
                <div class="field" style="flex:1">
                  <label>Schema</label>
                  <input id="schemaInput" type="text" value="public" />
                </div>
                <div class="field" style="flex:2">
                  <label>Filtrar tabela</label>
                  <input id="tableFilterInput" type="text" placeholder="Nome da tabela..." />
                </div>
                <div class="field" style="flex:1">
                  <label>Aplicar tabela em</label>
                  <select id="tableTargetCompanySelect"></select>
                </div>
              </div>
              <div class="list-scroll" id="supabaseTablesList"></div>
            </div>
          </section>
        </div>

        <div class="section-group">
          <div class="section-divider">
            <h2>Empresas</h2>
            <span class="line"></span>
          </div>

          <section class="card anim-card">
            <div class="card-header">
              <span class="card-title"><span class="bar"></span>Cadastro de empresas</span>
              <button id="addCompanyBtn" class="btn btn-secondary btn-sm">Adicionar empresa</button>
            </div>
            <div id="companiesContainer"></div>
            <div class="actions-row" style="margin-top:16px">
              <button id="saveCompaniesBtn" class="btn btn-primary">Salvar empresas.json</button>
              <button id="reloadCompaniesBtn" class="btn btn-secondary">Recarregar arquivo</button>
            </div>
            <div id="saveFeedback" class="config-feedback"></div>
            <div class="status-bar" id="statusBar">
              <span class="status-dot"></span>
              <span id="statusText">Carregando configurações...</span>
            </div>
          </section>
        </div>
      </div>
    </main>

    <footer class="app-footer">
      <span class="footer-left">Dev by <strong>IA Infinity</strong></span>
      <span class="footer-center">© 2026 IA Infinity</span>
      <span class="footer-right"></span>
    </footer>

    <script defer src="/assets/js/theme-toggle.js"></script>
    <script defer src="/assets/js/configuracoes-dashboard.js"></script>
    <datalist id="supabaseTablesDatalist"></datalist>
